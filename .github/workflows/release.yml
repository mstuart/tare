name: release

# Build self-contained binaries for each platform and attach them to the GitHub Release, then
# (on a version tag, if NPM_TOKEN is set) publish the npm wrapper package. Triggered by a version
# tag, or manually via workflow_dispatch to (re)attach binaries to an existing release.
on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build and attach binaries to (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14      # Apple silicon
            target: aarch64-apple-darwin
          - os: macos-14      # cross-compile Intel on Apple silicon (macos-13 runners are scarce/queued)
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p tare-cli -p tare-proxy -p tare-mcp
      - name: Package
        id: package
        shell: bash
        run: |
          asset="tare-${{ matrix.target }}.tar.gz"
          out="target/${{ matrix.target }}/release"
          tar -czf "$asset" -C "$out" tare tare-proxy tare-mcp
          shasum -a 256 "$asset" > "$asset.sha256"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"
      - name: Attach to release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          gh release upload "$tag" \
            "${{ steps.package.outputs.asset }}" \
            "${{ steps.package.outputs.asset }}.sha256" \
            --clobber --repo "$GITHUB_REPOSITORY"

  npm-publish:
    name: publish npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Publish to npm (needs NPM_TOKEN; idempotent)
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret not set — skipping npm publish."
            exit 0
          fi
          # On a version tag, sync the package version to the tag; on manual dispatch, publish
          # package.json's current version. Skip if that version is already on npm (idempotent).
          case "$GITHUB_REF" in
            refs/tags/*) npm version --no-git-tag-version --allow-same-version "${GITHUB_REF_NAME#v}" ;;
          esac
          ver="$(node -p "require('./package.json').version")"
          if npm view "tare-ai@${ver}" version >/dev/null 2>&1; then
            echo "tare-ai@${ver} is already published — skipping."
            exit 0
          fi
          npm publish --access public
