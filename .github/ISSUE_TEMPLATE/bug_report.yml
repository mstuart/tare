name: Bug report
description: Report a problem with tare
labels: [bug]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: tare version / commit
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - proxy
        - CLI
        - library
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Include the command and, if possible, a minimal input.
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Rust version, and model/provider if relevant.
